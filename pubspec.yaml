  bitsdojo_window: ^0.1.6
  auto_route: ^10.0.1
  styled_widget: ^0.4.1
  shared_preferences: ^2.5.3
  flutter_riverpod: ^2.6.1
  path_provider: ^2.1.5
  dio: ^5.8.0+1
  very_good_infinite_list: ^0.9.0
  freezed_annotation: ^3.0.0
