  auto_route_generator: ^10.0.1
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  drift_dev: ^2.26.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  # https://github.com/dart-lang/sdk/issues/60784#issuecomment-2904784415
  analyzer: 7.3.0
  analyzer_plugin: 0.12.0
  # https://github.com/dart-lang/sdk/issues/60784#issuecomment-2906872272
  custom_lint_visitor: 1.0.0+7.3.0
  # https://github.com/superlistapp/super_native_extensions/issues/524#issuecomment-2918531753
  super_native_extensions:
    git:
      url: https://github.com/superlistapp/super_native_extensions.git
      ref: refs/pull/525/head
      path: super_native_extensions
  irondash_engine_context:
    git:
      url: https://github.com/irondash/irondash.git
      ref: refs/pull/66/head
      path: engine_context/dart

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/i18n/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-Italic.ttf
          style: italic

  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  image_path_ios_dark_transparent: "assets/icons/icon-dark.png"
  remove_alpha_ios: true
  desaturate_tinted_to_grayscale_ios: true
  background_color_ios: "#ffffff"
  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#ffffff"
    theme_color: "#7d80ba"
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icons/icon-padded.png"

flutter_native_splash:
  image: "assets/icons/icon.png"
  image_dark: "assets/icons/icon-dark.png"
  color: "#ffffff"
  color_dark: "#121212"
