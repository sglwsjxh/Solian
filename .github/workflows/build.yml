name: Build Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - linux
          - android

jobs:
  build-exe:
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" --dart-define=API_BASE_URL=https://api.akiromusic.art
      - name: Extract Version
        id: extract_version
        run: |
          $pubspec = Get-Content pubspec.yaml -Raw
          if ($pubspec -match 'version:\s*(\d+\.\d+\.\d+)\+(\d+)') {
            $appVersion = $matches[1]
            $buildNumber = $matches[2]
            Write-Host "app_version=$appVersion" >> $env:GITHUB_OUTPUT
            Write-Host "build_number=$buildNumber" >> $env:GITHUB_OUTPUT
          }
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-windows
          path: build/windows/x64/runner/Release
      - name: Compile Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss
          options: "/DAppVersion=${{ steps.extract_version.outputs.app_version }} /DBuildNumber=${{ steps.extract_version.outputs.build_number }}"
      - name: Archive installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-windows-installer
          path: Installer/windows-x86_64-setup.exe
  build-linux:
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get install -y libcurl4-openssl-dev
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
          sudo apt-get install -y libmpv-dev mpv
          sudo apt-get install -y libayatana-appindicator3-dev
          sudo apt-get install -y keybinder-3.0
          sudo apt-get install -y libnotify-dev
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
          sudo apt-get install -y gstreamer-1.0
          sudo apt-get install -y libsecret-1-dev
      - run: flutter pub get
      - run: flutter build linux --no-tree-shake-icons --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}" --dart-define=API_BASE_URL=https://api.akiromusic.art
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-linux
          path: build/linux/x64/release/bundle
      - name: Build AppImage
        run: bash buildtools/build-appimage.sh
      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-linux-appimage
          path: "./*.AppImage*"
  build-android:
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --dart-define=API_BASE_URL=https://api.akiromusic.art
      - name: Archive Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-android
          path: build/app/outputs/flutter-apk/*.apk

  release:
    needs: [build-exe, build-linux, build-android]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows installer artifact
        if: needs.build-exe.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: build-output-windows-installer
          path: ./artifacts/windows
      - name: Download Windows release artifact
        if: needs.build-exe.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: build-output-windows
          path: ./artifacts/windows-release
      - name: Download Linux AppImage artifact
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: build-output-linux-appimage
          path: ./artifacts/linux
      - name: Download Linux release artifact
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: build-output-linux
          path: ./artifacts/linux-release
      - name: Download Android artifact
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: build-output-android
          path: ./artifacts/android
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows/*.exe
            ./artifacts/windows/*.zip
            ./artifacts/linux/*.AppImage*
            ./artifacts/android/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
