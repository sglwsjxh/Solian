server {
    listen 80;
    server_name akiromusic.art;
    root /var/www/solian/web;
    index index.html;

    # SPA routing - all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip for web assets
    gzip on;
    gzip_types application/javascript text/css application/wasm application/json;
    gzip_min_length 256;

    # Long cache for versioned static assets (flutter.js, icons, images)
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|woff2?|eot|ttf|css|js\.map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Short cache for main.dart.js (rebuilt on every deploy)
    location ~* /main\.dart\.js {
        expires 0;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # WebAssembly support
    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
